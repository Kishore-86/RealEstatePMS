<template>

    <lightning-card
        title="Lease Agreement List"
        icon-name="standard:contract">

        <template if:true={isLoading}>
            <lightning-spinner
                alternative-text="Loading"
                size="medium">
            </lightning-spinner>
        </template>

        <div class="slds-p-around_medium">

            <div class="slds-grid slds-wrap slds-gutters">

                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">

                    <lightning-input
                        type="search"
                        label="Search Lease"
                        placeholder="Search by Lease Name"
                        value={searchKey}
                        onchange={handleSearch}>
                    </lightning-input>

                </div>

                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-4">

                    <lightning-combobox
                        label="Sort By"
                        value={sortField}
                        options={sortFieldOptions}
                        onchange={handleSort}>
                    </lightning-combobox>

                </div>

                <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-4">

                    <lightning-combobox
                        label="Order"
                        value={sortDirection}
                        options={sortDirectionOptions}
                        onchange={handleSortDirection}>
                    </lightning-combobox>

                </div>

            </div>

        </div>

        <template if:true={leaseAgreements}>

            <div class="table-container">

                <table class="slds-table slds-table_bordered slds-table_cell-buffer">

                    <thead>

                        <tr>

                            <th>Lease</th>
                            <th>Tenant</th>
                            <th>Property</th>
                            <th>Rent</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody>

                        <template
                            for:each={leaseAgreements}
                            for:item="lease">

                            <tr key={lease.Id}>

                                <td>{lease.Name}</td>
                                <td>{lease.Tenant__r.Name}</td>
                                <td>{lease.Property__r.Name}</td>
                                <td>{lease.Monthly_Rent__c}</td>
                                <td>{lease.Start_Date__c}</td>
                                <td>{lease.End_Date__c}</td>
                                <td>{lease.Lease_Status__c}</td>

                            </tr>

                        </template>

                    </tbody>

                </table>

            </div>

        </template>

        <div class="slds-p-around_medium slds-align_absolute-center">

            <lightning-button
                label="Previous"
                onclick={previousPage}
                disabled={disablePrevious}>
            </lightning-button>

            <span class="slds-m-horizontal_large">
                Page {pageNumber} of {totalPages}
            </span>

            <lightning-button
                label="Next"
                variant="brand"
                onclick={nextPage}
                disabled={disableNext}>
            </lightning-button>

        </div>

    </lightning-card>

</template>
